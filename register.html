<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | VoiceSEO Pro</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="d-flex align-items-center min-vh-100 bg-body-tertiary">

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-6 col-md-8">
                <div class="custom-card shadow-lg p-4 p-md-5">
                    <!-- Branding logo -->
                    <div class="text-center mb-4">
                        <a class="navbar-brand d-inline-flex align-items-center fs-2 text-decoration-none text-body" href="index.html">
                            <i class="bi bi-mic-fill me-2 text-primary"></i>
                            <span class="fw-bold">VoiceSEO<span class="text-secondary">Pro</span></span>
                        </a>
                    </div>
                    <h3 class="fw-bold text-center mb-2">Create Account</h3>
                    <p class="text-muted small text-center mb-4">Get started with a free Voice & AI Search campaign audit</p>
                    
                    <form action="dashboard.html">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">First Name</label>
                            <input type="text" class="form-control" placeholder="John" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Last Name</label>
                            <input type="text" class="form-control" placeholder="Doe" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Email Address</label>
                            <input type="email" class="form-control" placeholder="john@company.com" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Website URL</label>
                            <input type="url" class="form-control" placeholder="https://www.company.com" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Password</label>
                            <div class="input-group">
                                <span class="input-group-text  border-end-0"><i class="bi bi-lock text-muted"></i></span>
                                <input type="password" class="form-control border-start-0 border-end-0" id="regPassword" placeholder="••••••••" required>
                                <button class="btn btn-password-toggle border-start-0" type="button" onclick="togglePassword('regPassword', this)">
                                    <i class="bi bi-eye-fill"></i>
                                </button>
                            </div>
                        </div>
                        <div class="mb-4 form-check">
                            <input type="checkbox" class="form-check-input" id="termsCheck" required>
                            <label class="form-check-label small" for="termsCheck">I agree to the <a href="coming-soon.html" class="text-primary text-decoration-none auth-link-hover">Terms of Service</a> & <a href="coming-soon.html" class="text-primary text-decoration-none auth-link-hover">Privacy Policy</a></label>
                        </div>
                        
                        <button type="submit" class="btn btn-primary w-100 py-3 fw-bold mb-3">Create Account</button>

                        <div class="position-relative my-4">
                            <hr class="text-muted">
                            <span class="position-absolute top-50 start-50 translate-middle bg-body px-3 small text-muted">Or continue with</span>
                        </div>

                        <div class="d-flex gap-3 mb-4">
                            <a href="#" class="btn btn-light border w-100 d-flex align-items-center justify-content-center shadow-sm fw-semibold text-dark auth-social-btn" style="transition: all 0.3s;">
                                <i class="bi bi-google me-2 text-danger"></i> Google
                            </a>
                            <a href="#" class="btn btn-light border w-100 d-flex align-items-center justify-content-center shadow-sm fw-semibold text-dark auth-social-btn" style="transition: all 0.3s;">
                                <i class="bi bi-apple me-2 text-dark"></i> Apple
                            </a>
                        </div>
                    </form>
                    
                    <div class="text-center mt-3">
                        <span class="small text-muted d-block d-sm-inline mb-2 mb-sm-0">Already have a console? <a href="login.html" class="text-primary fw-semibold text-decoration-none auth-link-hover ms-sm-1">Log in here</a></span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
