<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | VoiceSEO Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-body-tertiary">

    <!-- Theme & RTL Toggles -->
    <div class="position-fixed top-0 end-0 p-3 z-3">
        <button class="icon-btn shadow-sm bg-body border" id="theme-toggle"><i class="bi bi-moon-stars"></i></button>
        <button class="icon-btn shadow-sm bg-body border ms-2" id="rtl-toggle">RTL</button>
    </div>

    <div class="container py-5">
        <div class="row justify-content-center align-items-center min-vh-100">
            <div class="col-md-6">
                <div class="custom-card shadow-lg p-5">
                    <div class="text-center mb-4 pb-2 border-bottom">
                        <a class="navbar-brand d-inline-flex align-items-center" href="index.html">
                            <i class="bi bi-mic-fill me-2 fs-3"></i>
                            <span class="fs-3">VoiceSEO<span class="text-secondary">Pro</span></span>
                        </a>
                    </div>
                    <h2 class="text-center mb-4">Create Account</h2>
                    <form action="dashboard.html">
                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label class="form-label">First Name</label>
                                <input type="text" class="form-control" placeholder="John" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Last Name</label>
                                <input type="text" class="form-control" placeholder="Doe" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email address</label>
                            <input type="email" class="form-control" placeholder="name@example.com" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <div class="input-group">
                                <input type="password" class="form-control border-end-0" placeholder="••••••••" required id="password-field">
                                <span class="input-group-text bg-body-secondary border-start-0 cursor-pointer text-muted" onclick="togglePassword('password-field', this)">
                                    <i class="bi bi-eye"></i>
                                </span>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Confirm Password</label>
                            <div class="input-group">
                                <input type="password" class="form-control border-end-0" placeholder="••••••••" required id="confirm-password-field">
                                <span class="input-group-text bg-body-secondary border-start-0 cursor-pointer text-muted" onclick="togglePassword('confirm-password-field', this)">
                                    <i class="bi bi-eye"></i>
                                </span>
                            </div>
                        </div>
                        <div class="mb-4">
                            <div class="form-check">
                                <input type="checkbox" class="form-check-input" id="terms" required>
                                <label class="form-check-label small" for="terms">I agree to the <a href="#" class="text-primary text-decoration-none">Terms & Conditions</a></label>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-secondary w-100 btn-lg mb-4">Sign Up</button>
                    </form>

                    <div class="text-center position-relative my-4">
                        <hr>
                        <span class="position-absolute top-50 start-50 translate-middle bg-body px-3 text-muted small">OR SIGN UP WITH</span>
                    </div>

                    <div class="d-flex gap-3 justify-content-center mb-4">
                        <a href="#" class="social-btn"><i class="bi bi-google"></i></a>
                        <a href="#" class="social-btn"><i class="bi bi-apple"></i></a>
                    </div>

                    <p class="text-center mb-0">Already have an account? <a href="login.html" class="text-primary text-decoration-none fw-bold">Login</a></p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
