<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon | VoiceSEO Pro</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="d-flex align-items-center min-vh-100 bg-body-tertiary">

    <div class="container py-5 text-center">
        <div class="row justify-content-center">
            <div class="col-lg-8 animate-up">
                <!-- Branding logo -->
                <div class="mb-4">
                    <a class="navbar-brand d-inline-flex align-items-center fs-2" href="index.html">
                        <i class="bi bi-mic-fill me-2 text-primary"></i>
                        <span class="fw-bold">VoiceSEO<span class="text-secondary">Pro</span></span>
                    </a>
                </div>
                
                <span class="badge bg-secondary mb-3 p-2 px-3">Under Construction</span>
                <h1 class="display-3 fw-bold mb-4">A New Voice Experience <br><span class="text-gradient">Is Whispering Closer</span></h1>
                <p class="lead text-muted mb-5 mx-auto" style="max-width: 600px;">I am configuring my next-generation RAG schema indexing modules and Siri coordinate lookups. Enter your email to be notified when this node goes active.</p>
                
                <!-- Countdown Ticker -->
                <div class="row g-3 justify-content-center mb-5 max-w-700 mx-auto">
                    <div class="col-3 col-sm-2">
                        <div class="p-3 bg-white rounded-3 shadow-sm border border-primary">
                            <h3 class="fw-bold text-primary mb-0" id="days">24</h3>
                            <small class="text-muted text-uppercase small" style="font-size: 0.65rem;">Days</small>
                        </div>
                    </div>
                    <div class="col-3 col-sm-2">
                        <div class="p-3 bg-white rounded-3 shadow-sm border border-secondary">
                            <h3 class="fw-bold text-secondary mb-0" id="hours">14</h3>
                            <small class="text-muted text-uppercase small" style="font-size: 0.65rem;">Hours</small>
                        </div>
                    </div>
                    <div class="col-3 col-sm-2">
                        <div class="p-3 bg-white rounded-3 shadow-sm border border-warning">
                            <h3 class="fw-bold text-warning mb-0" id="minutes">52</h3>
                            <small class="text-muted text-uppercase small" style="font-size: 0.65rem;">Min</small>
                        </div>
                    </div>
                    <div class="col-3 col-sm-2">
                        <div class="p-3 bg-white rounded-3 shadow-sm border border-info">
                            <h3 class="fw-bold text-info mb-0" id="seconds">08</h3>
                            <small class="text-muted text-uppercase small" style="font-size: 0.65rem;">Sec</small>
                        </div>
                    </div>
                </div>

                <!-- Newsletter Form -->
                <form class="input-group mx-auto" style="max-width: 500px;">
                    <input type="email" class="form-control" placeholder="john@company.com" required>
                    <button class="btn btn-primary px-4 fw-bold" type="submit">Notify Me</button>
                </form>
                
                <div class="mt-5">
                    <a href="index.html" class="btn btn-outline-secondary"><i class="bi bi-arrow-left me-2"></i>Return to Homepage</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
    <script>
        // Real-time custom countdown ticker for coming-soon.html
        let targetDate = new Date();
        targetDate.setDate(targetDate.getDate() + 24); // 24 days out
        
        function updateTicker() {
            const now = new Date().getTime();
            const difference = targetDate - now;
            
            const d = Math.floor(difference / (1000 * 60 * 60 * 24));
            const h = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((difference % (1000 * 60)) / 1000);
            
            const daysEl = document.getElementById('days');
            const hoursEl = document.getElementById('hours');
            const minutesEl = document.getElementById('minutes');
            const secondsEl = document.getElementById('seconds');
            
            if (daysEl) daysEl.innerHTML = d < 10 ? '0' + d : d;
            if (hoursEl) hoursEl.innerHTML = h < 10 ? '0' + h : h;
            if (minutesEl) minutesEl.innerHTML = m < 10 ? '0' + m : m;
            if (secondsEl) secondsEl.innerHTML = s < 10 ? '0' + s : s;
        }
        
        setInterval(updateTicker, 1000);
        updateTicker();
    </script>
</body>
</html>
